<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Running Club Merch</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     THEME VARIABLES — tweak colours here
     ============================================================ */
  :root {
    --bg:        #0d0f14;
    --bg2:       #161a23;
    --bg3:       #1e2330;
    --accent:    #e8ff47;   /* neon yellow-green */
    --accent2:   #ff5e3a;   /* orange-red highlight */
    --txt:       #f0f2f7;
    --txt2:      #8b90a0;
    --border:    rgba(255,255,255,0.08);
    --card-r:    12px;
    --transition: 0.22s cubic-bezier(.4,0,.2,1);
  }

  /* ============================================================
     RESET & BASE
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--txt);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    line-height: 1.55;
    min-height: 100vh;
    overflow-x: hidden;
  }
  img { display: block; max-width: 100%; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  /* ============================================================
     SCROLLBAR
     ============================================================ */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

  /* ============================================================
     HEADER
     ============================================================ */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px, 4vw, 48px);
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 20px; height: 20px; }
  .logo-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.35rem;
    letter-spacing: 0.03em;
    line-height: 1;
  }
  .logo-text span { color: var(--accent); }

  .cart-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--txt);
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    transition: background var(--transition), border-color var(--transition);
  }
  .cart-btn:hover { background: var(--bg3); border-color: var(--accent); }
  .cart-badge {
    background: var(--accent);
    color: #000;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 800;
    transition: transform 0.2s;
  }
  .cart-badge.bump { animation: bump 0.3s ease; }
  @keyframes bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

  /* ============================================================
     HERO
     ============================================================ */
  .hero {
    padding: clamp(48px, 8vw, 96px) clamp(16px, 4vw, 48px) clamp(40px, 6vw, 72px);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 70% 50%, rgba(232,255,71,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .hero h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(2.8rem, 8vw, 6rem);
    line-height: 0.95;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    max-width: 700px;
    margin-bottom: 20px;
  }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero-sub {
    color: var(--txt2);
    font-size: 1.05rem;
    max-width: 480px;
    font-weight: 400;
  }

  /* ============================================================
     SECTION HEADER
     ============================================================ */
  .section-header {
    padding: 0 clamp(16px, 4vw, 48px) 28px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .item-count {
    font-size: 0.82rem;
    color: var(--txt2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ============================================================
     PRODUCT GRID
     ============================================================ */
  .products {
    padding: 0 clamp(16px, 4vw, 48px);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    margin-bottom: 80px;
  }

  .product-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color var(--transition), transform var(--transition);
  }
  .product-card:hover {
    border-color: rgba(232,255,71,0.35);
    transform: translateY(-3px);
  }

  .product-img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
  }

  .product-body {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .product-meta {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .product-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    letter-spacing: 0.02em;
    line-height: 1.15;
  }

  .product-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .product-desc {
    font-size: 0.83rem;
    color: var(--txt2);
    line-height: 1.5;
  }

  .selectors { display: flex; flex-direction: column; gap: 10px; }

  .selector-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--txt2);
    margin-bottom: 5px;
  }

  .option-group { display: flex; flex-wrap: wrap; gap: 6px; }

  .opt-btn {
    padding: 5px 11px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--txt);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    transition: background var(--transition), border-color var(--transition), color var(--transition);
  }
  .opt-btn:hover { border-color: rgba(232,255,71,0.5); }
  .opt-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .opt-btn.unavailable {
    opacity: 0.3;
    cursor: not-allowed;
    text-decoration: line-through;
  }

  .qty-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .qty-btn {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--txt);
    font-size: 1.2rem;
    font-weight: 700;
    transition: background var(--transition);
  }
  .qty-btn:hover { background: rgba(255,255,255,0.08); }
  .qty-val {
    min-width: 32px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
  }

  .add-btn {
    flex: 1;
    background: var(--accent);
    color: #000;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0 16px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background var(--transition), transform 0.15s;
  }
  .add-btn:hover { background: #f5ff80; }
  .add-btn:active { transform: scale(0.97); }
  .add-btn:disabled {
    background: var(--bg3);
    color: var(--txt2);
    cursor: not-allowed;
  }

  /* ============================================================
     CART DRAWER
     ============================================================ */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  .cart-drawer {
    position: fixed;
    top: 0; right: 0;
    width: min(420px, 100vw);
    height: 100vh;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  }
  .cart-drawer.open { transform: translateX(0); }

  .cart-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .close-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--txt2);
    font-size: 1.3rem;
    transition: background var(--transition), color var(--transition);
  }
  .close-btn:hover { background: var(--accent); color: #000; }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .cart-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--txt2);
    gap: 12px;
  }
  .cart-empty-icon { font-size: 3rem; opacity: 0.4; }
  .cart-empty p { font-size: 0.9rem; }

  .cart-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .cart-item-emoji {
    font-size: 2rem;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg2);
    border-radius: 8px;
    flex-shrink: 0;
  }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 0.02em;
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .cart-item-opts {
    font-size: 0.75rem;
    color: var(--txt2);
    margin-bottom: 6px;
  }
  .cart-item-bot {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cart-item-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
  }
  .cart-item-qty {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cart-qty-btn {
    width: 24px;
    height: 24px;
    border-radius: 5px;
    background: var(--bg2);
    color: var(--txt);
    font-weight: 700;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition);
  }
  .cart-qty-btn:hover { background: var(--accent); color: #000; }
  .cart-qty-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    min-width: 20px;
    text-align: center;
  }

  .cart-footer {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .cart-totals { display: flex; flex-direction: column; gap: 6px; }
  .cart-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.88rem;
    color: var(--txt2);
  }
  .cart-row.total {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    color: var(--txt);
    margin-top: 4px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .cart-row.total span:last-child { color: var(--accent); }

  .paypal-btn {
    background: #0070ba;
    color: #fff;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background var(--transition);
  }
  .paypal-btn:hover { background: #005ea6; }
  .paypal-btn svg { width: 22px; height: 22px; fill: #fff; }

  .paypal-note {
    font-size: 0.75rem;
    color: var(--txt2);
    text-align: center;
    line-height: 1.4;
  }
  .paypal-note strong { color: var(--txt); }

  /* ============================================================
     TOAST
     ============================================================ */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--accent);
    color: var(--txt);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    z-index: 300;
    pointer-events: none;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ============================================================
     FOOTER
     ============================================================ */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px clamp(16px, 4vw, 48px);
    text-align: center;
    color: var(--txt2);
    font-size: 0.8rem;
  }
  footer strong { color: var(--accent); }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 480px) {
    .products { grid-template-columns: 1fr 1fr; gap: 12px; }
    .product-body { padding: 12px; }
    .hero h1 { font-size: 2.4rem; }
  }
  @media (max-width: 360px) {
    .products { grid-template-columns: 1fr; }
  }
</style>
</head>

     PAGE HTML

<div class="products" id="productsGrid"></div>

<!-- Cart drawer -->

  <div class="cart-header">

</div>

<!-- Toast notification -->
<div class="toast" id="toast">✓ Added to cart</div>

<footer>
  <p>© <span id="footerYear"></span> <strong id="footerClub"></strong> · All prices in <span id="footerCurrency"></span> · Payments via PayPal Friends &amp; Family</p>
</footer>

<!-- ============================================================
     APP LOGIC
     ============================================================ -->
<script>
/* ---- State ---- */
const cart = {};          // { "productId|size|gender": { product, size, gender, qty } }

/* ---- Init ---- */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('clubNameLogo').textContent  = CLUB_NAME;
  document.getElementById('heroSub').textContent       = `Rep your club in style. Quality gear for the ${CLUB_NAME} community.`;
  document.getElementById('itemCount').textContent     = `${PRODUCTS.length} items`;
  document.getElementById('footerYear').textContent    = new Date().getFullYear();
  document.getElementById('footerClub').textContent    = CLUB_NAME;
  document.getElementById('footerCurrency').textContent = CURRENCY;
  renderProducts();
});

/* ---- Render product grid ---- */
function renderProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = '';
  PRODUCTS.forEach(p => {
    const card = buildProductCard(p);
    grid.appendChild(card);
  });
}

function buildProductCard(p) {
  const card = document.createElement('div');
  card.className = 'product-card';
  card.id = 'card-' + p.id;

  let selectorsHTML = '';

  if (p.genders && p.genders.length) {
    selectorsHTML += `
      <div>
        <div class="selector-label">Style</div>
        <div class="option-group" id="genders-${p.id}">
          ${p.genders.map(g => `<button class="opt-btn" data-type="gender" data-pid="${p.id}" data-val="${g}" onclick="selectOption(this)">${g}</button>`).join('')}
        </div>
      </div>`;
  }

  if (p.sizes && p.sizes.length) {
    selectorsHTML += `
      <div>
        <div class="selector-label">Size</div>
        <div class="option-group" id="sizes-${p.id}">
          ${p.sizes.map(s => `<button class="opt-btn" data-type="size" data-pid="${p.id}" data-val="${s}" onclick="selectOption(this)">${s}</button>`).join('')}
        </div>
      </div>`;
  }

  card.innerHTML = `
    <div class="product-img">${p.emoji}</div>
    <div class="product-body">
      <div class="product-meta">
        <div class="product-name">${p.name}</div>
        <div class="product-price">${CURRENCY_SYM}${p.price.toFixed(2)}</div>
      </div>
      <p class="product-desc">${p.description}</p>
      ${selectorsHTML ? `<div class="selectors">${selectorsHTML}</div>` : ''}
      <div class="qty-row">
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
          <span class="qty-val" id="qty-${p.id}">1</span>
          <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
        </div>
        <button class="add-btn" id="addBtn-${p.id}" onclick="addToCart('${p.id}')" ${(p.sizes.length || p.genders.length) ? 'disabled' : ''}>
          + ADD
        </button>
      </div>
    </div>`;
  return card;
}

/* ---- Selection logic ---- */
const cardState = {}; // { pid: { size, gender, qty } }

function getState(pid) {
  if (!cardState[pid]) cardState[pid] = { size: null, gender: null, qty: 1 };
  return cardState[pid];
}

function selectOption(btn) {
  const { type, pid, val } = btn.dataset;
  const state = getState(pid);
  if (type === 'size')   state.size   = val;
  if (type === 'gender') state.gender = val;

  // Update UI highlights
  btn.closest('.option-group').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Enable add button if all required fields chosen
  const product = PRODUCTS.find(p => p.id === pid);
  const sizeOk   = !product.sizes.length   || state.size;
  const genderOk = !product.genders.length || state.gender;
  document.getElementById('addBtn-' + pid).disabled = !(sizeOk && genderOk);
}

function changeQty(pid, delta) {
  const state = getState(pid);
  state.qty = Math.max(1, (state.qty || 1) + delta);
  document.getElementById('qty-' + pid).textContent = state.qty;
}

/* ---- Cart logic ---- */
function addToCart(pid) {
  const product = PRODUCTS.find(p => p.id === pid);
  const state   = getState(pid);
  const key     = [pid, state.size || '', state.gender || ''].join('|');

  if (cart[key]) {
    cart[key].qty += state.qty;
  } else {
    cart[key] = { product, size: state.size, gender: state.gender, qty: state.qty };
  }

  updateCartUI();
  showToast(`${product.name} added!`);

  // Reset qty
  state.qty = 1;
  document.getElementById('qty-' + pid).textContent = 1;
}

function removeFromCart(key) {
  delete cart[key];
  updateCartUI();
}

function changeCartQty(key, delta) {
  if (!cart[key]) return;
  cart[key].qty = Math.max(1, cart[key].qty + delta);
  if (cart[key].qty === 0) delete cart[key];
  updateCartUI();
}

function updateCartUI() {
  const keys   = Object.keys(cart);
  const total  = keys.reduce((s, k) => s + cart[k].product.price * cart[k].qty, 0);
  const count  = keys.reduce((s, k) => s + cart[k].qty, 0);

  // Badge
  const badge = document.getElementById('cartBadge');
  badge.textContent = count;
  badge.classList.remove('bump');
  void badge.offsetWidth;
  badge.classList.add('bump');

  // Footer
  document.getElementById('footerCount').textContent = count + ' item' + (count !== 1 ? 's' : '');
  document.getElementById('footerTotal').textContent = CURRENCY_SYM + total.toFixed(2);
  document.getElementById('cartFooter').style.display = keys.length ? '' : 'none';

  // Items
  const container = document.getElementById('cartItems');
  if (!keys.length) {
    container.innerHTML = `<div class="cart-empty">
      <div class="cart-empty-icon">🛒</div>
      <p>Your cart is empty.<br>Add some gear!</p>
    </div>`;
    return;
  }

  container.innerHTML = keys.map(k => {
    const { product: p, size, gender, qty } = cart[k];
    const opts = [gender, size].filter(Boolean).join(' · ');
    return `<div class="cart-item">
      <div class="cart-item-emoji">${p.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        ${opts ? `<div class="cart-item-opts">${opts}</div>` : ''}
        <div class="cart-item-bot">
          <div class="cart-item-price">${CURRENCY_SYM}${(p.price * qty).toFixed(2)}</div>
          <div class="cart-item-qty">
            <button class="cart-qty-btn" onclick="changeCartQty('${k}',-1)">−</button>
            <span class="cart-qty-num">${qty}</span>
            <button class="cart-qty-btn" onclick="changeCartQty('${k}',1)">+</button>
            <button class="cart-qty-btn" style="margin-left:4px;color:#ff5e3a" onclick="removeFromCart('${k}')">✕</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ---- Checkout ---- */
function checkout() {
  const keys  = Object.keys(cart);
  if (!keys.length) return;
  const total = keys.reduce((s, k) => s + cart[k].product.price * cart[k].qty, 0).toFixed(2);

  // Build a readable note for the PayPal transfer description
  const note = keys.map(k => {
    const { product: p, size, gender, qty } = cart[k];
    const opts = [gender, size].filter(Boolean).join('/');
    return `${qty}x ${p.name}${opts ? ' ('+opts+')' : ''}`;
  }).join(', ');

  const encodedNote = encodeURIComponent(`${CLUB_NAME} merch order: ${note}`);
  const paypalUrl   = `https://www.paypal.com/paypalme/${PAYPAL_ME}/${total}${CURRENCY}`;

  // Open PayPal in a new tab
  window.open(paypalUrl, '_blank');

  // Show a reminder in the cart
  showToast('Opening PayPal… please include your order details!');
}

/* ---- Drawer ---- */
function openCart() {
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
  // Make sure cart is populated
  if (!Object.keys(cart).length) updateCartUI();
}

function closeCart() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

/* ---- Toast ---- */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ---- Initial empty cart render ---- */
updateCartUI();
</script>

</body>
</html>
